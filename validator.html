<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCAverse — Question Preview</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #17171f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43d9ad;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --correct: #1a3a2a;
    --correct-border: #43d9ad;
    --wrong: #3a1a1a;
    --wrong-border: #ff6584;
    --radius: 12px;
    --font-mono: 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 2px;
    font-weight: bold;
  }

  .logo span { color: var(--accent2); }

  .stats-bar {
    display: flex;
    gap: 20px;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  .stat { color: var(--text); font-weight: bold; }
  .stat-label { color: var(--muted); margin-left: 4px; }

  /* Upload zone */
  .upload-zone {
    max-width: 700px;
    margin: 80px auto;
    text-align: center;
    padding: 0 20px;
  }

  .upload-box {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 60px 40px;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--surface);
    position: relative;
  }

  .upload-box:hover, .upload-box.drag {
    border-color: var(--accent);
    background: rgba(108, 99, 255, 0.05);
  }

  .upload-icon {
    font-size: 48px;
    margin-bottom: 20px;
    display: block;
  }

  .upload-title {
    font-size: 22px;
    color: var(--text);
    margin-bottom: 10px;
    font-family: var(--font-mono);
  }

  .upload-sub {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  .upload-btn {
    margin-top: 24px;
    display: inline-block;
    padding: 12px 28px;
    background: var(--accent);
    color: white;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 13px;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s;
  }

  .upload-btn:hover { opacity: 0.85; }

  #fileInput { display: none; }

  /* Controls */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  label { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }

  select, input[type=text], input[type=number] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font-mono);
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input:focus { border-color: var(--accent); }

  input[type=text] { width: 200px; }
  input[type=number] { width: 70px; }

  .btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: none;
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--wrong); color: var(--accent2); border: 1px solid var(--wrong-border); }

  .error-only-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .error-only-toggle input { cursor: pointer; accent-color: var(--accent2); }

  /* Main layout */
  .app { display: none; }
  .app.active { display: block; }

  .main { display: flex; height: calc(100vh - 120px); }

  /* Sidebar */
  .sidebar {
    width: 320px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .q-list-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .q-list-item:hover { background: var(--surface2); }
  .q-list-item.active { background: rgba(108, 99, 255, 0.12); border-left: 3px solid var(--accent); }
  .q-list-item.has-error { border-left: 3px solid var(--accent2); }

  .q-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    min-width: 40px;
    margin-top: 2px;
  }

  .q-preview {
    flex: 1;
    min-width: 0;
  }

  .q-id {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 3px;
  }

  .q-text-preview {
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.4;
  }

  .q-meta {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted);
  }

  .badge.error { background: var(--wrong); color: var(--accent2); }
  .badge.medium { color: #f5a623; background: rgba(245,166,35,0.1); }
  .badge.hard { color: var(--accent2); background: rgba(255,101,132,0.1); }
  .badge.easy { color: var(--green); background: rgba(67,217,173,0.1); }

  /* Question panel */
  .q-panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    max-width: 860px;
  }

  .q-panel::-webkit-scrollbar { width: 4px; }
  .q-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .q-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .q-header-id {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    background: rgba(108,99,255,0.1);
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid rgba(108,99,255,0.3);
  }

  .q-header-topic {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .q-header-year {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-left: auto;
  }

  .render-error-banner {
    background: var(--wrong);
    border: 1px solid var(--wrong-border);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent2);
  }

  /* Question text */
  .question-text {
    font-size: 17px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 28px;
    padding: 20px 24px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    font-size: 15px;
    line-height: 1.6;
  }

  .option:hover:not(.selected):not(.correct):not(.wrong) {
    border-color: var(--accent);
    background: rgba(108,99,255,0.05);
  }

  .option.selected { border-color: var(--accent); background: rgba(108,99,255,0.08); }
  .option.correct { border-color: var(--correct-border); background: var(--correct); }
  .option.wrong { border-color: var(--wrong-border); background: var(--wrong); }

  .option-label {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: bold;
    min-width: 24px;
    color: var(--muted);
  }

  .option.correct .option-label { color: var(--green); }
  .option.wrong .option-label { color: var(--accent2); }
  .option.selected .option-label { color: var(--accent); }

  .option-text { flex: 1; }

  /* Actions */
  .actions {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  /* Explanation */
  .explanation {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
  }

  .explanation.visible { display: block; }

  .explanation-title {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--green);
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .explanation-text {
    font-size: 15px;
    line-height: 1.9;
    color: var(--text);
  }

  /* Raw JSON viewer */
  .raw-toggle {
    margin-bottom: 16px;
  }

  .raw-json {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
  }

  .raw-json.visible { display: block; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 14px;
    gap: 12px;
  }

  .empty-state span { font-size: 40px; }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  .page-info { flex: 1; text-align: center; }

  /* KaTeX overrides */
  .katex { font-size: 1em !important; }
  .katex-display { margin: 10px 0 !important; overflow-x: auto; }

  /* Render error highlight */
  .katex-error { color: var(--accent2) !important; font-size: 12px !important; }

  /* Scrollbar overall */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- Upload screen -->
<div id="uploadScreen">
  <div class="header">
    <div class="logo">MCA<span>verse</span></div>
    <div class="stats-bar" style="color: var(--muted); font-size: 12px;">Question Bank Preview Tool</div>
  </div>
  <div class="upload-zone">
    <div class="upload-box" id="dropZone">
      <span class="upload-icon">📂</span>
      <div class="upload-title">Load Question Database</div>
      <div class="upload-sub">
        Drop your <strong style="color:var(--accent)">fresh_database_dump_FIXED.json</strong> here<br>
        or any other JSON question bank file.<br><br>
        Questions render with full LaTeX via KaTeX — same engine as your frontend.
      </div>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
        Choose File
      </button>
      <input type="file" id="fileInput" accept=".json">
    </div>
  </div>
</div>

<!-- Main app -->
<div class="app" id="app">
  <div class="header">
    <div class="logo">MCA<span>verse</span></div>
    <div class="stats-bar">
      <span><span class="stat" id="totalCount">0</span><span class="stat-label">questions</span></span>
      <span><span class="stat" id="errorCount">0</span><span class="stat-label">render errors</span></span>
      <span><span class="stat" id="currentPos">-</span><span class="stat-label">shown</span></span>
      <button class="btn btn-secondary" onclick="resetApp()" style="margin-left:8px;">↩ Load New File</button>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Search</label>
      <input type="text" id="searchInput" placeholder="ID, topic, text..." oninput="applyFilters()">
    </div>
    <div class="control-group">
      <label>Subject</label>
      <select id="subjectFilter" onchange="applyFilters()">
        <option value="">All</option>
      </select>
    </div>
    <div class="control-group">
      <label>Topic</label>
      <select id="topicFilter" onchange="applyFilters()">
        <option value="">All</option>
      </select>
    </div>
    <div class="control-group">
      <label>Difficulty</label>
      <select id="diffFilter" onchange="applyFilters()">
        <option value="">All</option>
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
      </select>
    </div>
    <div class="control-group">
      <label>Year</label>
      <input type="number" id="yearFilter" placeholder="e.g. 2020" oninput="applyFilters()">
    </div>
    <label class="error-only-toggle">
      <input type="checkbox" id="errorsOnly" onchange="applyFilters()">
      Errors only
    </label>
    <button class="btn btn-secondary" onclick="resetFilters()">Clear</button>
  </div>

  <div class="main">
    <!-- Sidebar list -->
    <div class="sidebar" id="sidebar">
      <div class="pagination">
        <button class="btn btn-secondary" onclick="prevPage()" id="prevBtn">◀</button>
        <div class="page-info" id="pageInfo">-</div>
        <button class="btn btn-secondary" onclick="nextPage()" id="nextBtn">▶</button>
      </div>
      <div id="qList"></div>
    </div>

    <!-- Question panel -->
    <div class="q-panel" id="qPanel">
      <div class="empty-state">
        <span>📝</span>
        Select a question from the list
      </div>
    </div>
  </div>
</div>

<script>
let allQuestions = [];
let filteredQuestions = [];
let currentPage = 0;
const PAGE_SIZE = 50;
let currentIdx = -1;
let renderErrors = {};
let selectedOption = null;
let answered = false;

// ── File loading ──────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadFile(file);
});

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Expected a JSON array');
      allQuestions = data;
      initApp();
    } catch (err) {
      alert('Failed to parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function initApp() {
  document.getElementById('uploadScreen').style.display = 'none';
  document.getElementById('app').classList.add('active');

  // Populate filters
  const subjects = [...new Set(allQuestions.map(q => q.subject).filter(Boolean))].sort();
  const topics = [...new Set(allQuestions.map(q => q.topic).filter(Boolean))].sort();

  const subSel = document.getElementById('subjectFilter');
  subjects.forEach(s => { const o = document.createElement('option'); o.value = s; o.text = s; subSel.appendChild(o); });

  const topSel = document.getElementById('topicFilter');
  topics.forEach(t => { const o = document.createElement('option'); o.value = t; o.text = t; topSel.appendChild(o); });

  applyFilters();
}

function resetApp() {
  document.getElementById('uploadScreen').style.display = 'block';
  document.getElementById('app').classList.remove('active');
  allQuestions = [];
  filteredQuestions = [];
  renderErrors = {};
  currentIdx = -1;
  document.getElementById('fileInput').value = '';
}

// ── Filters ───────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const subject = document.getElementById('subjectFilter').value;
  const topic = document.getElementById('topicFilter').value;
  const diff = document.getElementById('diffFilter').value;
  const year = document.getElementById('yearFilter').value;
  const errOnly = document.getElementById('errorsOnly').checked;

  filteredQuestions = allQuestions.filter(q => {
    if (subject && q.subject !== subject) return false;
    if (topic && q.topic !== topic) return false;
    if (diff && q.difficulty !== diff) return false;
    if (year && String(q.year) !== year) return false;
    if (errOnly && !renderErrors[q.id]) return false;
    if (search) {
      const hay = [q.id, q.topic, q.subject, q.question_text, ...(q.options||[])].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  currentPage = 0;
  renderSidebar();
  document.getElementById('totalCount').textContent = allQuestions.length;
  document.getElementById('errorCount').textContent = Object.keys(renderErrors).length;
  document.getElementById('currentPos').textContent = filteredQuestions.length + ' filtered';
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('subjectFilter').value = '';
  document.getElementById('topicFilter').value = '';
  document.getElementById('diffFilter').value = '';
  document.getElementById('yearFilter').value = '';
  document.getElementById('errorsOnly').checked = false;
  applyFilters();
}

// ── Sidebar ───────────────────────────────────────────
function renderSidebar() {
  const start = currentPage * PAGE_SIZE;
  const end = Math.min(start + PAGE_SIZE, filteredQuestions.length);
  const pageItems = filteredQuestions.slice(start, end);

  const list = document.getElementById('qList');
  list.innerHTML = '';

  pageItems.forEach((q, i) => {
    const globalIdx = start + i;
    const hasError = !!renderErrors[q.id];
    const div = document.createElement('div');
    div.className = 'q-list-item' + (hasError ? ' has-error' : '') + (globalIdx === currentIdx ? ' active' : '');
    div.onclick = () => showQuestion(globalIdx);

    const preview = (q.question_text || '').replace(/\$[^$]*\$/g, '…').replace(/\s+/g, ' ').slice(0, 60);
    const diffClass = (q.difficulty || '').toLowerCase();

    div.innerHTML = `
      <div class="q-num">#${globalIdx + 1}</div>
      <div class="q-preview">
        <div class="q-id">${q.id || '?'}</div>
        <div class="q-text-preview">${preview}</div>
        <div class="q-meta">
          ${q.year ? `<span class="badge">${q.year}</span>` : ''}
          ${q.difficulty ? `<span class="badge ${diffClass}">${q.difficulty}</span>` : ''}
          ${hasError ? '<span class="badge error">⚠ render err</span>' : ''}
        </div>
      </div>`;
    list.appendChild(div);
  });

  const totalPages = Math.ceil(filteredQuestions.length / PAGE_SIZE);
  document.getElementById('pageInfo').textContent = `Page ${currentPage + 1} / ${totalPages || 1}`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
}

function prevPage() { if (currentPage > 0) { currentPage--; renderSidebar(); } }
function nextPage() {
  if (currentPage < Math.ceil(filteredQuestions.length / PAGE_SIZE) - 1) {
    currentPage++;
    renderSidebar();
  }
}

// ── Question display ──────────────────────────────────
function showQuestion(idx) {
  currentIdx = idx;
  selectedOption = null;
  answered = false;
  renderSidebar();

  const q = filteredQuestions[idx];
  if (!q) return;

  const panel = document.getElementById('qPanel');
  const errId = 'err_' + q.id;
  const errors = [];

  panel.innerHTML = `
    <div class="q-header">
      <div class="q-header-id">${q.id}</div>
      <div class="q-header-topic">${q.subject || ''} › ${q.topic || ''}</div>
      ${q.year ? `<div class="q-header-year">${q.year} · ${q.exam_id || ''}</div>` : ''}
    </div>

    <div id="${errId}" class="render-error-banner" style="display:none"></div>

    <div class="question-text" id="qtext">${q.question_text || ''}</div>

    <div class="options" id="opts">
      ${(q.options || []).map((opt, i) => `
        <div class="option" id="opt_${i}" onclick="selectOption(${i}, ${JSON.stringify(q.correct_answers)})">
          <div class="option-label">${String.fromCharCode(65+i)}</div>
          <div class="option-text" id="opttext_${i}">${opt}</div>
        </div>
      `).join('')}
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="submitAnswer(${JSON.stringify(q.correct_answers)})">Check Answer</button>
      <button class="btn btn-secondary" onclick="toggleExplanation()">Show Explanation</button>
      <button class="btn btn-secondary" onclick="toggleRaw()">Raw JSON</button>
      ${idx > 0 ? `<button class="btn btn-secondary" onclick="showQuestion(${idx-1})">◀ Prev</button>` : ''}
      ${idx < filteredQuestions.length-1 ? `<button class="btn btn-secondary" onclick="showQuestion(${idx+1})">Next ▶</button>` : ''}
    </div>

    <div class="explanation" id="explanation">
      <div class="explanation-title">✦ Explanation</div>
      <div class="explanation-text" id="expltext">${q.explanation || 'No explanation provided.'}</div>
    </div>

    <div class="raw-toggle">
      <div class="raw-json" id="rawJson">${JSON.stringify(q, null, 2)}</div>
    </div>
  `;

  // Render KaTeX
  const renderOpts = {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$', right: '$', display: false}
    ],
    throwOnError: false,
    errorColor: '#ff6584',
    output: 'html'
  };

  const elements = ['qtext', 'expltext', ...Array.from({length: (q.options||[]).length}, (_,i) => `opttext_${i}`)];

  elements.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    try {
      renderMathInElement(el, renderOpts);
      // check for katex-error class
      if (el.querySelector('.katex-error')) {
        errors.push(`Render error in ${id}`);
      }
    } catch(e) {
      errors.push(`KaTeX failed on ${id}: ${e.message}`);
    }
  });

  if (errors.length) {
    renderErrors[q.id] = errors;
    const banner = document.getElementById(errId);
    banner.style.display = 'block';
    banner.innerHTML = '⚠ KaTeX Render Errors:<br>' + errors.map(e => `• ${e}`).join('<br>');
    document.getElementById('errorCount').textContent = Object.keys(renderErrors).length;
  } else {
    delete renderErrors[q.id];
  }
}

function selectOption(idx, correctAnswers) {
  if (answered) return;
  selectedOption = idx;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
}

function submitAnswer(correctAnswers) {
  if (selectedOption === null) { alert('Please select an option first.'); return; }
  answered = true;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.remove('selected');
    if (correctAnswers.includes(i)) el.classList.add('correct');
    else if (i === selectedOption) el.classList.add('wrong');
  });
}

function toggleExplanation() {
  document.getElementById('explanation').classList.toggle('visible');
}

function toggleRaw() {
  document.getElementById('rawJson').classList.toggle('visible');
}
</script>
</body>
</html>
