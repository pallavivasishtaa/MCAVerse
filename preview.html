<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCAverse Mock Test Preview</title>

<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$','$$'], ['\\[','\\]']]
  },
  svg: {
    fontCache: 'global'
  }
};
</script>

<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:30px;
}
.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}
.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
  font-weight:bold;
}
.question{
  font-size:20px;
  margin-bottom:20px;
  line-height:1.7;
}
.option{
  background:#eef2ff;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
}
button{
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-right:10px;
}
.explanation{
  margin-top:20px;
  background:#ecfccb;
  padding:15px;
  border-radius:10px;
  display:none;
}
img{
  max-width:300px;
  margin:15px 0;
}

.question{
   white-space: pre-line;
}

.explanation{
   white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">

<div class="top">
  <div id="qno"></div>
  <div id="topic"></div>
</div>

<div class="question" id="questionText"></div>

<img id="questionImage" style="display:none;">

<div id="optionsBox"></div>

<br>

<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Next</button>
<button onclick="showAnswer()">Show Answer</button>

<div class="explanation" id="explanationBox"></div>

</div>

<script>
let questions = [];
let current = 0;

fetch("logical_reasoning_2008.json")
.then(res => res.json())
.then(data => {
  questions = data;
  loadQuestion();
});

function renderMath(){
  if(window.MathJax){
    MathJax.typesetPromise();
  }
}

function loadQuestion(){

  let q = questions[current];

  document.getElementById("qno").innerText =
    "Question " + (current+1) + " / " + questions.length;

  document.getElementById("topic").innerText = q.topic;

  document.getElementById("questionText").innerHTML = q.question_text;

  let img = document.getElementById("questionImage");

  if(q.imageUrl && q.imageUrl.trim() !== ""){
    img.src = q.imageUrl;
    img.style.display = "block";
  }else{
    img.style.display = "none";
  }

  let html = "";

  q.options.forEach((op,i)=>{
    html += `
      <div class="option">
        ${String.fromCharCode(65+i)}. ${op}
      </div>
    `;
  });

  document.getElementById("optionsBox").innerHTML = html;

  document.getElementById("explanationBox").style.display = "none";
  document.getElementById("explanationBox").innerHTML = "";

  renderMath();
}

function nextQ(){
  if(current < questions.length-1){
    current++;
    loadQuestion();
  }
}

function prevQ(){
  if(current > 0){
    current--;
    loadQuestion();
  }
}

function showAnswer(){

  let q = questions[current];

  let ans = q.correct_answers.map(i =>
    String.fromCharCode(65+i)).join(", ");

  document.getElementById("explanationBox").innerHTML =
    "<b>Correct Answer:</b> " + ans +
    "<br><br><b>Explanation:</b> " + q.explanation;

  document.getElementById("explanationBox").style.display = "block";

  renderMath();
}
</script>

</body>
</html>
